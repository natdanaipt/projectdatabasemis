<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root {
  --navy: #0f1b2d;
  --navy2: #162337;
  --navy3: #1e3050;
  --accent: #3b9eff;
  --accent2: #5bb5ff;
  --gold: #f5a623;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f97316;
  --purple: #a855f7;
  --teal: #14b8a6;
  --text: #e2eaf5;
  --text2: #8fa3bf;
  --text3: #4d6680;
  --border: rgba(59,158,255,0.12);
  --border2: rgba(59,158,255,0.22);
  --card: rgba(22,35,55,0.92);
  --glass: rgba(15,27,45,0.85);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Sarabun', sans-serif;
  background: var(--navy);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 20px;
  background: var(--navy2);
  border-bottom: 1px solid var(--border2);
  flex-shrink: 0;
  z-index: 1000;
}
.logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), #1a6bd4);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.header-title { font-family: 'Prompt', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); }
.header-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
.header-spacer { flex: 1; }

/* stat pills */
.stat-pills { display: flex; gap: 8px; }
.stat-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  background: var(--navy3);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
}
.stat-pill .num { font-weight: 600; font-size: 14px; }
.stat-pill .lbl { color: var(--text2); font-size: 11px; }

/* search */
.search-wrap {
  display: flex; align-items: center; gap: 8px;
  background: var(--navy3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 6px 12px;
  min-width: 200px;
}
.search-wrap input {
  background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'Sarabun', sans-serif; font-size: 13px;
  width: 100%;
}
.search-wrap input::placeholder { color: var(--text3); }
.search-icon { color: var(--text3); font-size: 14px; }

/* ── MAIN LAYOUT ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 300px; flex-shrink: 0;
  display: flex; flex-direction: column;
  background: var(--navy2);
  border-right: 1px solid var(--border);
  overflow: hidden;
}

.filter-bar {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px;
}
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-label { font-size: 11px; color: var(--text2); font-weight: 500; margin-bottom: 2px; }
.chip {
  padding: 4px 10px; border-radius: 14px; border: 1px solid var(--border2);
  font-size: 11px; cursor: pointer; transition: all .15s;
  color: var(--text2); background: var(--navy3);
  white-space: nowrap;
}
.chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
.chip:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

.list-header {
  padding: 8px 14px;
  font-size: 11px; color: var(--text2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.count-badge {
  background: var(--navy3); border: 1px solid var(--border);
  border-radius: 10px; padding: 1px 7px; font-size: 10px; color: var(--accent);
}

.student-list { overflow-y: auto; flex: 1; }
.student-list::-webkit-scrollbar { width: 4px; }
.student-list::-webkit-scrollbar-track { background: transparent; }
.student-list::-webkit-scrollbar-thumb { background: var(--navy3); border-radius: 4px; }

.student-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.student-item:hover { background: var(--navy3); }
.student-item.active { background: rgba(59,158,255,0.1); border-left: 2px solid var(--accent); }

.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; flex-shrink: 0;
}
.si-info { flex: 1; min-width: 0; }
.si-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.si-company { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.si-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.score-badge {
  font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 6px;
}
.faculty-dot { width: 6px; height: 6px; border-radius: 50%; }

/* ── MAP ── */
#map { flex: 1; z-index: 1; }

/* leaflet overrides */
.leaflet-container { background: #0a1525; }
.leaflet-tile { filter: brightness(0.75) saturate(0.6) hue-rotate(200deg); }

/* custom marker */
.pin-marker {
  width: 36px; height: 36px; border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  border: 2px solid rgba(255,255,255,0.3);
  box-shadow: 0 3px 12px rgba(0,0,0,0.5);
  cursor: pointer;
  transition: transform .15s;
}
.pin-inner {
  transform: rotate(45deg);
  font-size: 11px; font-weight: 700; color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.pin-count {
  position: absolute; top: -6px; right: -6px;
  background: #fff; color: #0f1b2d;
  border-radius: 10px; font-size: 9px; font-weight: 700;
  padding: 1px 5px; min-width: 16px; text-align: center;
  border: 1px solid rgba(0,0,0,0.1);
}

/* ── DETAIL PANEL (right) ── */
.detail-panel {
  width: 290px; flex-shrink: 0;
  background: var(--navy2);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
  transition: transform .25s;
}
.detail-panel::-webkit-scrollbar { width: 4px; }
.detail-panel::-webkit-scrollbar-thumb { background: var(--navy3); border-radius: 4px; }
.detail-panel.hidden { display: none; }

.dp-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px;
}
.dp-avatar {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; flex-shrink: 0;
}
.dp-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
.dp-id { font-size: 11px; color: var(--text2); margin-top: 2px; }
.dp-faculty { font-size: 11px; margin-top: 4px; }

.dp-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.dp-section-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .8px; color: var(--text3); margin-bottom: 10px;
}
.dp-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.dp-key { font-size: 12px; color: var(--text2); }
.dp-val { font-size: 12px; font-weight: 500; text-align: right; max-width: 160px; }

.score-ring {
  width: 56px; height: 56px; margin: 0 auto 8px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; border: 3px solid;
  font-size: 20px; font-weight: 700;
}
.eval-comment {
  font-size: 12px; color: var(--text2);
  background: var(--navy3); border-radius: 8px;
  padding: 8px 10px; line-height: 1.6; margin-top: 6px;
}

.status-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; border-radius: 8px;
  font-size: 12px; font-weight: 500;
}

/* ── POPUP ── */
.leaflet-popup-content-wrapper {
  background: var(--navy2) !important;
  border: 1px solid var(--border2) !important;
  border-radius: 12px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
  color: var(--text) !important;
  font-family: 'Sarabun', sans-serif !important;
}
.leaflet-popup-tip { background: var(--navy2) !important; }
.leaflet-popup-content { margin: 12px 16px !important; }
.popup-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.popup-row { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.popup-row span { color: var(--text); font-weight: 500; }
.popup-students { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
.popup-student-chip {
  font-size: 10px; padding: 2px 7px; border-radius: 10px;
  background: var(--navy3); border: 1px solid var(--border);
  cursor: pointer; transition: border-color .12s;
}
.popup-student-chip:hover { border-color: var(--accent); color: var(--accent); }

/* ── LEGEND ── */
.legend {
  position: absolute; bottom: 24px; left: 314px; z-index: 500;
  background: var(--glass); backdrop-filter: blur(10px);
  border: 1px solid var(--border2); border-radius: 10px;
  padding: 10px 14px; font-size: 11px;
}
.legend-title { font-weight: 600; margin-bottom: 7px; color: var(--text2); font-size: 10px; text-transform: uppercase; letter-spacing: .6px; }
.legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* empty state */
.empty-state { padding: 32px 16px; text-align: center; color: var(--text2); font-size: 13px; }
</style>
</head>

</div>

const map = L.map("map", { zoomControl: false }).setView([13.756, 100.544], 11);
L.control.zoom({ position: "bottomright" }).addTo(map);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap", maxZoom: 18,
}).addTo(map);

let mapMarkers = {};

function typeColor(tid) {
  const c = ["#3b9eff","#f97316","#22c55e","#f5a623","#a855f7"];
  return c[(tid-1) % c.length];
}

function buildMarker(company, students) {
  const col = typeColor(company.type_id);
  const icon = L.divIcon({
    className: "",
    html: `<div class="pin-marker" style="background:${col}20;border-color:${col}60;">
             <div class="pin-inner" style="color:${col}">${students.length}</div>
             ${students.length > 1 ? `<div class="pin-count">${students.length}</div>` : ""}
           </div>`,
    iconSize: [36,36], iconAnchor: [18,36], popupAnchor: [0,-38],
  });

  const m = L.marker([company.lat, company.lng], { icon }).addTo(map);

  const chips = students.map(s =>
    `<div class="popup-student-chip" onclick="selectStudent('${s.id}')">${s.fname} ${s.lname.slice(0,4)}.</div>`
  ).join("");

  const avgScore = students.filter(s=>s.score).length
    ? (students.filter(s=>s.score).reduce((a,s)=>a+s.score,0) / students.filter(s=>s.score).length).toFixed(1)
    : "-";

  m.bindPopup(`
    <div class="popup-title">${company.name}</div>
    <div class="popup-row">ประเภท: <span>${COMPANY_TYPE[company.type_id]}</span></div>
    <div class="popup-row">นักศึกษา: <span>${students.length} คน</span> · คะแนนเฉลี่ย: <span>${avgScore}</span></div>
    <div class="popup-students">${chips}</div>
  `, { maxWidth: 280 });

  m.on("click", () => m.openPopup());
  return m;
}

function getFiltered() {
  return STUDENTS.filter(s => {
    if (activeFilters.faculty !== "all" && s.fid != activeFilters.faculty) return false;
    if (activeFilters.status !== "all" && s.status != activeFilters.status) return false;
    if (activeFilters.q) {
      const q = activeFilters.q.toLowerCase();
      if (!s.fullname.includes(activeFilters.q) &&
          !s.id.includes(activeFilters.q) &&
          !(s.company && s.company.name.toLowerCase().includes(q)) &&
          !s.fac.name.includes(activeFilters.q)) return false;
    }
    return true;
  });
}

function renderMap(filtered) {
  // Remove old markers
  Object.values(mapMarkers).forEach(m => map.removeLayer(m));
  mapMarkers = {};

  // Group by company
  const byCompany = {};
  filtered.forEach(s => {
    if (!s.company) return;
    if (!byCompany[s.company.id]) byCompany[s.company.id] = { company: s.company, students: [] };
    byCompany[s.company.id].students.push(s);
  });

  Object.values(byCompany).forEach(({ company, students }) => {
    mapMarkers[company.id] = buildMarker(company, students);
  });
}

function scoreColor(score) {
  if (!score) return "#888";
  if (score >= 9) return "#22c55e";
  if (score >= 7) return "#f5a623";
  return "#ef4444";
}

function renderList(filtered) {
  const el = document.getElementById("student-list");
  document.getElementById("list-count").textContent = filtered.length;

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state">ไม่พบนักศึกษาที่ตรงกับเงื่อนไข</div>`;
    return;
  }

  el.innerHTML = filtered.map(s => {
    const fac = s.fac;
    const score = s.score;
    const stat = s.status;
    const statusEmoji = stat === 3 ? "✅" : stat === 2 ? "🔄" : stat === 1 ? "⏳" : "❓";
    return `
      <div class="student-item ${s.id === selectedId ? "active" : ""}" onclick="selectStudent('${s.id}')">
        <div class="avatar" style="background:${fac.bg};color:${fac.color}">${s.fname[0]}</div>
        <div class="si-info">
          <div class="si-name">${s.fname} ${s.lname}</div>
          <div class="si-company">${s.company ? s.company.name : "ไม่มีข้อมูล"}</div>
        </div>
        <div class="si-right">
          ${score != null ? `<div class="score-badge" style="background:${scoreColor(score)}20;color:${scoreColor(score)}">${score}/10</div>` : ""}
          <span style="font-size:12px">${statusEmoji}</span>
        </div>
      </div>`;
  }).join("");
}

function applyFilters() {
  activeFilters.q = document.getElementById("search").value.trim();
  const filtered = getFiltered();
  renderList(filtered);
  renderMap(filtered);
  updateStats(filtered);
}

function setFaculty(el, val) {
  activeFilters.faculty = val;
  document.querySelectorAll("[data-faculty]").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  applyFilters();
}

function setStatus(el, val) {
  activeFilters.status = val;
  document.querySelectorAll("[data-status]").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  applyFilters();
}

function selectStudent(id) {
  selectedId = id;
  const s = STUDENTS.find(x => x.id === id);
  renderDetail(s);
  applyFilters(); // re-render list with active highlight
  if (s && s.company) {
    map.flyTo([s.company.lat, s.company.lng], 14, { duration: 0.8 });
  }
  // scroll list to item
  setTimeout(() => {
    const el = document.querySelector(".student-item.active");
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
  }, 100);
}

function flyToStudent(id) {
  const s = STUDENTS.find(x => x.id === id);
  if (s && s.company) {
    map.flyTo([s.company.lat, s.company.lng], 15, { duration: 1 });
    setTimeout(() => {
      const m = mapMarkers[s.company.id];
      if (m) m.openPopup();
    }, 1100);
  }
}

function updateStats(filtered) {
  const done = filtered.filter(s => s.status === 3).length;
  const scores = filtered.filter(s => s.score != null).map(s => s.score);
  const avg = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : "-";
  const companyIds = new Set(filtered.filter(s=>s.company).map(s=>s.company.id));
  document.getElementById("stat-students").textContent = filtered.length;
  document.getElementById("stat-companies").textContent = companyIds.size;
  document.getElementById("stat-done").textContent = done;
  document.getElementById("stat-avg").textContent = avg;
}
